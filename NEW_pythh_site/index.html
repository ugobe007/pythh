<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- Primary Meta -->

    <meta name="author" content="Pythh.ai" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://pythh.ai/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pythh.ai/" />
    <meta property="og:title" content="Pythh.ai — Automate Your Investment Pipeline" />
    <meta property="og:description" content="Meet PYTHIA — your AI fundraising oracle. Identify the right investors, prepare pitch materials, reach out on your behalf, and book the meetings." />

    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="Pythh.ai" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@pythhai" />
    <meta name="twitter:creator" content="@pythhai" />
    <meta name="twitter:title" content="Pythh.ai — Automate Your Investment Pipeline" />

    <meta name="twitter:image" content="https://pythh.ai/og-image.png" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Pythh.ai",
      "description": "AI-powered investor intelligence and fundraising automation platform for startups.",
      "url": "https://pythh.ai",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD",
        "description": "Free 7-day trial of the Oracle plan"
      },
      "creator": {
        "@type": "Organization",
        "name": "Pythh.ai",
        "url": "https://pythh.ai"
      }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
    <script
      defer
