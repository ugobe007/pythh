# fly.toml app configuration file
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'hot-honey'
primary_region = 'lax'

# Runtime env (Docker final stage has no .env). Public Supabase URL + anon key for build/browser.
# REQUIRED for admin + server-side RPCs (bypasses RLS): set the service_role JWT on Fly — it is NOT
# listed here on purpose. Local .env SUPABASE_SERVICE_KEY is never deployed.
#   fly secrets set SUPABASE_SERVICE_KEY="eyJ…"   # same value as in your local .env
# Without it, Node falls back to VITE_SUPABASE_ANON_KEY below → /api/admin/* often 502/503.
[env]
  SUPABASE_URL = "https://unkpogyhhjbvxxjvmxlt.supabase.co"
  VITE_SUPABASE_URL = "https://unkpogyhhjbvxxjvmxlt.supabase.co"
  VITE_SUPABASE_ANON_KEY = "sb_publishable_Ii6LaEBqdDaBkPfNl_lsXg_kiUGPiD2"

[build]
  dockerfile = 'Dockerfile'

  [build.args]
    VITE_SUPABASE_URL = "https://unkpogyhhjbvxxjvmxlt.supabase.co"
    VITE_SUPABASE_ANON_KEY = "sb_publishable_Ii6LaEBqdDaBkPfNl_lsXg_kiUGPiD2"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 2

[checks]
  [checks.health]
    port = 8080
    type = "http"
    interval = "15s"
    timeout = "10s"
    grace_period = "120s"
    method = "GET"
    path = "/api/instant/_ready"

[[vm]]
  memory = '4096mb'
  cpu_kind = 'shared'
  cpus = 2
  memory_mb = 4096
