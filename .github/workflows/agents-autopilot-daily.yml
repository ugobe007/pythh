name: Agent Autopilot Daily

on:
  schedule:
    - cron: '0 11 * * *'  # 11am UTC daily — after funnel heartbeat (9am)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'rotate'
        type: choice
        options:
          - rotate
          - full
          - metrics-only

permissions:
  contents: write
  pull-requests: write

jobs:
  autopilot:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Agent autopilot
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          BASE: https://pythh.ai
          AGENT_ALLOW_SHIP: '1'
          AGENT_ALLOW_PUSH: '1'
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then ARGS="--full"; fi
          if [ "${{ github.event.inputs.mode }}" = "metrics-only" ]; then ARGS="--metrics-only"; fi
          npm run agents:autopilot -- $ARGS

      - name: Ship agent improvements (PR)
        if: success() && github.event.inputs.mode != 'metrics-only'
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-autopilot-ship.mjs

      - name: Send owner daily agent report
        if: always()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ADMIN_EMAIL: ugobe07@gmail.com
          AGENT_DAILY_REPORT_TO: ugobe07@gmail.com
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          SITE_URL: https://pythh.ai
        run: npm run report:agent-daily

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-autopilot-${{ github.run_id }}
          path: |
            reports/conversion-funnel-*.json
            reports/funnel-heartbeat-*.json
            reports/product-metrics-*.json
            reports/growth-metrics-*.json
            reports/research-snapshot-*.json
            reports/*-agent-run-*.json
            reports/*-agent-*.json
            reports/agent-daily-report-*.json
            reports/autopilot-ship-verify-*.json
            reports/agent-autopilot-ship-*.json
            reports/orchestrator-brief-*.json
            agents/research/briefs/*.md
            agents/product/specs/*.md
