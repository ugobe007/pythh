name: Funnel Heartbeat Daily

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC — before research (Mon 8am is weekly only)
  workflow_dispatch:

jobs:
  funnel-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Funnel heartbeat probe (pythh.ai)
        env:
          BASE: https://pythh.ai
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run funnel:heartbeat

      - name: Conversion funnel snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run conversion:funnel

      - name: Product metrics snapshot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run product:metrics

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: funnel-heartbeat-${{ github.run_id }}
          path: |
            reports/funnel-heartbeat-*.json
            reports/conversion-funnel-*.json
            reports/product-metrics-*.json
