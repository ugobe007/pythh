# Startup enrichment: entity gate → URL resolve → qualified enrich (replaces no-url-only cron).
name: Startup Enrichment Batch

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: startup-enrichment-batch
  cancel-in-progress: true

jobs:
  enrich-sparse:
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: >-
        node scripts/cron/startup-data-tightening.js
        --run-entity-gate
        --sparse-limit=200
        --sparse-html-only
        --sparse-god-score-below=100
        --url-resolve-limit=200
        --skip-rss
        --skip-garbage
        --skip-exit-propensity
        --skip-dq-report
      timeout_minutes: 120
