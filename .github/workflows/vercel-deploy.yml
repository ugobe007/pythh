# Production frontend on Vercel — project: pythh (custom domain pythh.ai).
# NOT hot-money-honey — that is a legacy project; pushes there do not update pythh.ai.
#
# GitHub Actions secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN         — https://vercel.com/account/tokens
#   VERCEL_ORG_ID        — pythh → Settings → General → Team ID
#   VERCEL_PROJECT_ID    — pythh → Settings → General → Project ID
#   VERCEL_DEPLOY_HOOK   — optional fallback (Settings → Git → Deploy Hooks)
#
# Correct IDs (from `npx vercel link --yes --project pythh`):
#   VERCEL_ORG_ID=team_i9wBQr2ur295OmAB8COX5Q0r
#   VERCEL_PROJECT_ID=prj_BmDVCcXOsQrTW5iZCxiU1Mmo1vuW

name: Vercel Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: vercel-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Vercel secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=0
          if [ -z "$VERCEL_TOKEN" ]; then echo "::error::Missing VERCEL_TOKEN"; missing=1; fi
          if [ -z "$VERCEL_ORG_ID" ]; then echo "::error::Missing VERCEL_ORG_ID"; missing=1; fi
          if [ -z "$VERCEL_PROJECT_ID" ]; then echo "::error::Missing VERCEL_PROJECT_ID"; missing=1; fi
          exit "$missing"

      - name: Confirm secrets point at pythh project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: node scripts/verify-vercel-project.mjs

      - name: Write .vercel/project.json for CLI
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          mkdir -p .vercel
          node -e "const fs=require('fs'); fs.writeFileSync('.vercel/project.json', JSON.stringify({ orgId: process.env.VERCEL_ORG_ID, projectId: process.env.VERCEL_PROJECT_ID }));"

      - name: Deploy to Vercel (production)
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
        run: |
          deploy_cli() {
            echo "Deploying via vercel CLI --prod --force…"
            args=(deploy --prod --force --yes --logs --token "$VERCEL_TOKEN")
            if [ -n "$VITE_SUPABASE_URL" ]; then
              args+=(--build-env "VITE_SUPABASE_URL=$VITE_SUPABASE_URL")
            fi
            if [ -n "$VITE_SUPABASE_ANON_KEY" ]; then
              args+=(--build-env "VITE_SUPABASE_ANON_KEY=$VITE_SUPABASE_ANON_KEY")
            fi
            npx vercel@54.15.0 "${args[@]}"
          }

          if deploy_cli; then
            echo "method=cli" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning::CLI deploy failed — trying deploy hook fallback"
          if [ -n "$VERCEL_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$VERCEL_DEPLOY_HOOK"
            echo "method=hook" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Vercel CLI deploy failed and no VERCEL_DEPLOY_HOOK fallback"
          exit 1

      - name: Wait for deployment to propagate
        if: steps.deploy.outputs.method == 'hook'
        run: sleep 90

      - name: Verify pythh.ai frontend build
        run: |
          for i in $(seq 1 12); do
            if npm run check:deploy-cache; then
              break
            fi
            echo "Attempt $i: waiting for pythh.ai…"
            sleep 15
            if [ "$i" -eq 12 ]; then
              echo "::error::pythh.ai still broken after deploy"
              exit 1
            fi
          done

      - name: Verify deploy SHA matches main
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: npm run check:deploy-sha

  wizard-e2e:
    name: Wizard unlock E2E
    needs: deploy
    if: success()
    uses: ./.github/workflows/wizard-e2e-reusable.yml
    with:
      expected_sha: ${{ github.sha }}
