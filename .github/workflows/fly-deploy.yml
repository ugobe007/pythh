# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@v4
      
      # Setup Node.js (22+ avoids GitHub deprecation warnings for Node 20 runners)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      # Install dependencies
      - name: Install dependencies
        run: npm ci
      
      # Guard: GitHub Actions secrets (repo Settings → Secrets → Actions).
      # Accept either SUPABASE_* or VITE_SUPABASE_* names; Vite still sees VITE_* at build time.
      - name: Check required secrets
        run: |
          if [ -z "$VITE_SUPABASE_URL" ] || [ "$VITE_SUPABASE_URL" = "" ]; then
            echo "❌ ERROR: Set repository secrets SUPABASE_URL and SUPABASE_ANON_KEY (or VITE_SUPABASE_URL / VITE_SUPABASE_ANON_KEY)."
            exit 1
          fi
          if [ -z "$VITE_SUPABASE_ANON_KEY" ] || [ "$VITE_SUPABASE_ANON_KEY" = "" ]; then
            echo "❌ ERROR: Set SUPABASE_ANON_KEY (publishable key) or VITE_SUPABASE_ANON_KEY."
            exit 1
          fi
          echo "✅ Secrets verified — proceeding with build."
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      
      # Build the app with real Supabase credentials baked in
      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
      
      # Deploy to Fly.io using local Docker build so the pre-built dist/ is used
      # --local-only builds Docker on this runner (where dist/ already exists)
      # This avoids a second npm run build on the remote builder with no secrets
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        run: flyctl deploy --local-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
