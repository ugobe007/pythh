name: Wizard Funnel E2E

# Post-push E2E runs from Vercel Deploy (after prod SHA is live).
# This workflow covers scheduled monitoring + manual runs only.

on:
  schedule:
    - cron: '30 9 * * *'  # 9:30 UTC — after funnel heartbeat (9am)
  workflow_dispatch:

jobs:
  wizard-e2e:
    uses: ./.github/workflows/wizard-e2e-reusable.yml
    with:
      expected_sha: ''
