name: Wizard Funnel E2E

on:
  schedule:
    - cron: '30 9 * * *'  # 9:30 UTC — after funnel heartbeat (9am)
  push:
    branches:
      - main
    paths:
      - 'site/pages/Wizard.tsx'
      - 'site/components/wizard/**'
      - 'scripts/lib/wizardUnlockProbe.mjs'
      - 'scripts/wizard-unlock-ui-probe.mjs'
      - 'tests/wizard-unlock-funnel.spec.ts'
      - 'playwright.config.ts'
  workflow_dispatch:

jobs:
  wizard-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Verify prod build SHA
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: npm run check:deploy-sha
        continue-on-error: true

      - name: Wizard unlock UI probe
        env:
          BASE: https://pythh.ai
          SMOKE_URL: stripe.com
        run: npm run test:wizard-e2e

      - name: Playwright wizard funnel spec
        env:
          PLAYWRIGHT_BASE_URL: https://pythh.ai
          SMOKE_URL: stripe.com
        run: npx playwright test tests/wizard-unlock-funnel.spec.ts

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wizard-e2e-${{ github.run_id }}
          path: |
            reports/wizard-unlock-e2e-*.json
            playwright-report/
