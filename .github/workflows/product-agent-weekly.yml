name: Product Agent Weekly

on:
  schedule:
    - cron: '0 10 * * 1'  # Monday 10am UTC (after growth metrics at 9am)
  workflow_dispatch:

jobs:
  product-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Product agent loop
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npm run product:agent -- --max-turns=30 --max-budget-usd=3

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: product-agent-reports
          path: |
            reports/product-*.json
            agents/product/specs/*.md
