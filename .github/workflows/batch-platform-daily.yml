# Daily platform batch jobs (formerly PM2 cron on Fly — see docs/BATCH_JOBS.md).
name: Platform Daily Batch

on:
  schedule:
    - cron: '0 3 * * *'    # holding-review-worker
    - cron: '0 4 * * *'    # oracle-signal-backfill
    - cron: '0 5 * * *'    # rss-enrich (M&A + funding sync)
    - cron: '30 5 * * *'   # event-resolver (recover startups the frame parser missed)
    - cron: '50 5 * * *'   # signal-bridge (resolver investors → fundraising signals → signal scores)
    - cron: '0 7 * * *'    # sage-review (independent second-pass QA on scraped rows)
    - cron: '0 6 * * *'    # portfolio-monitor
    - cron: '30 6 * * *'   # portfolio-digest
    - cron: '0 8 * * *'    # portfolio-signals (daily M&A/funding/partnership/customer/hire/IP scan)
    - cron: '30 8 * * *'   # followon-fund (double down on winners' later-stage rounds, forward-only)
    - cron: '45 8 * * *'   # portfolio-exits (book verified M&A/IPO exits, target-only, honest entries)
    - cron: '0 13 * * *'   # daily-brief (newsletter email — 6am PT / 9am ET)
  workflow_dispatch:
    inputs:
      job:
        description: 'Run a single daily job manually'
        required: true
        type: choice
        options:
          - holding-review
          - oracle-backfill
          - rss-enrich
          - event-resolver
          - signal-bridge
          - sage-review
          - portfolio-monitor
          - portfolio-digest
          - portfolio-signals
          - followon-fund
          - portfolio-exits
          - portfolio-score-validate
          - daily-brief

concurrency:
  group: platform-daily-${{ github.event.schedule || github.event.inputs.job }}
  cancel-in-progress: false

jobs:
  holding-review:
    if: github.event.schedule == '0 3 * * *' || github.event.inputs.job == 'holding-review'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: npx tsx scripts/holding-review-worker.js --limit=100
      timeout_minutes: 30

  oracle-backfill:
    if: github.event.schedule == '0 4 * * *' || github.event.inputs.job == 'oracle-backfill'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: npx tsx scripts/oracle-signal-backfill.js --limit=200
      timeout_minutes: 45

  rss-enrich:
    if: github.event.schedule == '0 5 * * *' || github.event.inputs.job == 'rss-enrich'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/enrich-from-rss-news.js --limit 1500 --gate-exclude-junk
      timeout_minutes: 60

  # Independent recovery pass over startup_events: re-extracts the correct company,
  # investors, and funding from news snippets the frame parser missed/mis-extracted,
  # resolves + verifies a website, and stages results into discovered_startups (which
  # the auto-approve trigger imports into startup_uploads). Decoupled from the scraper.
  event-resolver:
    if: github.event.schedule == '30 5 * * *' || github.event.inputs.job == 'event-resolver'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      # 1) events: recover missed/mis-extracted startups (LLM) + reconcile scraper rows in place
      # 2) discovered: verify URL + link investors on the intake queue before promotion
      # 3) uploads: verified-URL + investor backfill over the no-website corpus (idempotent)
      run: node scripts/event-resolver.js --apply --hours 36 --limit 200 ; node scripts/event-resolver.js --apply --source discovered --limit 150 --concurrency 8 ; node scripts/event-resolver.js --apply --source uploads --limit 1500 --concurrency 8
      timeout_minutes: 60

  # Bridges resolver-linked investors into the signal pipeline, then refreshes
  # signal scores. Runs after event-resolver so the day's freshly-linked investors
  # are included.
  #   1) emit: one fundraising_signal event per resolver-found round (guarded:
  #      dedups vs existing fundraising signals, skips funds/junk names + entity-less
  #      rows, idempotent via extracted_data.signal_emitted_at, requires a website).
  #   2) sync: aggregate pythh_signal_events → startup_signal_scores (feeds
  #      signals_bonus → the 2-hourly GOD recalc). This is also the only scheduled
  #      run of sync-signal-scores, so it keeps the whole signal layer fresh.
  signal-bridge:
    if: github.event.schedule == '50 5 * * *' || github.event.inputs.job == 'signal-bridge'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/emit-resolver-signal-events.js --apply --require-website ; node scripts/sync-signal-scores.js --apply ; node scripts/cron/snapshot-signal-scores.mjs --apply
      timeout_minutes: 45

  # Independent second-pass QA: reviews scraped startup_uploads for missing data,
  # reconstructs fields PYTHIA can support from evidence, and stamps extracted_data.
  # Does NOT score — the 2-hourly god-score-recalculation picks up the enriched fields.
  sage-review:
    if: github.event.schedule == '0 7 * * *' || github.event.inputs.job == 'sage-review'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/pythia-sage-review.js --apply --limit=400
      timeout_minutes: 45

  portfolio-monitor:
    if: github.event.schedule == '0 6 * * *' || github.event.inputs.job == 'portfolio-monitor'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: npx tsx scripts/portfolio-monitor.mjs
      timeout_minutes: 45

  portfolio-digest:
    if: github.event.schedule == '30 6 * * *' || github.event.inputs.job == 'portfolio-digest'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/portfolio-digest.mjs
      timeout_minutes: 30

  # Daily material-signal scan over the locked portfolio: detects funding rounds,
  # M&A, partnerships, new customers, key hires, and product/IP news per company
  # (LLM-classified, company-matched, deduped) and records them to portfolio_events.
  # Funding valuations are plausibility-guarded and never synthesized.
  portfolio-signals:
    if: github.event.schedule == '0 8 * * *' || github.event.inputs.job == 'portfolio-signals'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/cron/portfolio-daily-signals.mjs --apply
      timeout_minutes: 45

  # Virtual follow-on fund: doubles down on Pythia's seed winners when they close a
  # later-stage round (post-money >= $100M) GOING FORWARD, recording a $500K check at the
  # round's real post-money. Runs after portfolio-signals so the day's fresh funding
  # rounds are on the books. Forward-only — no backfill of past rounds.
  followon-fund:
    if: github.event.schedule == '30 8 * * *' || github.event.inputs.job == 'followon-fund'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/cron/followon-fund.mjs --apply
      timeout_minutes: 15

  # Books verified realized exits: LLM-confirms the company was the acquisition TARGET (not
  # the acquirer) or IPO'd, sources the deal value, and marks the position exited against an
  # honest entry (real pre-exit valuation, else realized at cost — never a fabricated multiple).
  portfolio-exits:
    if: github.event.schedule == '45 8 * * *' || github.event.inputs.job == 'portfolio-exits'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/reconcile-portfolio-exits.mjs --apply
      timeout_minutes: 20

  portfolio-score-validate:
    if: github.event.schedule == '30 6 * * *' || github.event.inputs.job == 'portfolio-score-validate'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/validate-portfolio-scores.mjs
      timeout_minutes: 10

  daily-brief:
    if: github.event.schedule == '0 13 * * *' || github.event.inputs.job == 'daily-brief'
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: node scripts/send-daily-brief.js
      timeout_minutes: 20
