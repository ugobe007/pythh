# Peter outreach — automated weekly email to founders (Tue) and VCs (Mon).
name: Peter Outreach Weekly

on:
  schedule:
    - cron: '0 13 * * 1'   # Mon 13:00 UTC ≈ 8am ET — VC dealflow
    - cron: '0 13 * * 2'   # Tue 13:00 UTC ≈ 8am ET — founder matches
  workflow_dispatch:
    inputs:
      mode:
        description: 'Outreach mode'
        required: true
        type: choice
        options:
          - startup
          - vc
          - both
      limit:
        description: 'Emails per mode'
        required: false
        default: '20'
      scan:
        description: 'Startups to scan (founder mode only)'
        required: false
        default: '300'
      draft_only:
        description: 'Queue drafts only (no send)'
        required: false
        type: boolean
        default: false

concurrency:
  group: outreach-peter-${{ github.event.schedule || github.event.inputs.mode }}
  cancel-in-progress: false

jobs:
  investor-digest:
    if: >-
      github.event.schedule == '0 13 * * 1'
      || (github.event_name == 'workflow_dispatch' && (github.event.inputs.mode == 'vc' || github.event.inputs.mode == 'both'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - name: Peter dealflow digest (signed-up investors)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTREACH_USE_PYTHH_DOMAIN: 'true'
          EMAIL_FROM: 'Peter at Pythh <pythia@pythh.ai>'
          SITE_URL: https://pythh.ai
        run: npm run digest:investor

  outreach:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Resolve mode
        id: mode
        env:
          SCHEDULE: ${{ github.event.schedule }}
          INPUT_MODE: ${{ github.event.inputs.mode }}
        run: |
          if [ -n "$INPUT_MODE" ]; then
            echo "value=$INPUT_MODE" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "0 13 * * 1" ]; then
            echo "value=vc" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "0 13 * * 2" ]; then
            echo "value=startup" >> "$GITHUB_OUTPUT"
          else
            echo "value=startup" >> "$GITHUB_OUTPUT"
          fi

      - name: Peter founder outreach (Hunter + ZeroBounce)
        if: steps.mode.outputs.value == 'startup' || steps.mode.outputs.value == 'both'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          ZEROBOUNCE_API_KEY: ${{ secrets.ZEROBOUNCE_API_KEY }}
          OUTREACH_USE_PYTHH_DOMAIN: 'true'
          OUTREACH_FROM: pythia@pythh.ai
        run: |
          LIMIT="${{ github.event.inputs.limit || '20' }}"
          SCAN="${{ github.event.inputs.scan || '300' }}"
          ARGS="--limit ${LIMIT} --scan ${SCAN}"
          if [ "${{ github.event.inputs.draft_only }}" = "true" ]; then ARGS="$ARGS --draft-only"; fi
          node scripts/peter-founder-outreach.mjs $ARGS

      - name: Peter outreach (VCs)
        if: steps.mode.outputs.value == 'vc' || steps.mode.outputs.value == 'both'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTREACH_USE_PYTHH_DOMAIN: 'true'
          OUTREACH_FROM: pythia@pythh.ai
          OUTREACH_LIMIT: ${{ github.event.inputs.limit || '20' }}
          OUTREACH_DRAFT_ONLY: ${{ github.event.inputs.draft_only && 'true' || 'false' }}
        run: |
          ARGS="--mode vc --limit ${OUTREACH_LIMIT}"
          if [ "$OUTREACH_DRAFT_ONLY" = "true" ]; then ARGS="$ARGS --draft-only"; fi
          node scripts/outreach-agent.js $ARGS
