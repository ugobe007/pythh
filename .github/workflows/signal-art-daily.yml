# Daily Signal Art — generates edition at UTC midnight + backup before US morning.
# Homepage /api/art/teaser is read-only; generation must happen here (not on Fly request path).
name: Signal Art Daily

on:
  schedule:
    - cron: '5 0 * * *'   # 00:05 UTC — right after edition_date rolls (UTC)
    - cron: '0 6 * * *'   # 06:00 UTC — backup if primary run failed
  workflow_dispatch:

concurrency:
  group: signal-art-daily
  cancel-in-progress: false

jobs:
  generate:
    uses: ./.github/workflows/reusable-node-batch.yml
    secrets: inherit
    with:
      run: |
        if [ -z "$GEMINI_API_KEY" ]; then
          echo "::error::GEMINI_API_KEY repository secret is required for Signal Art raster generation."
          exit 1
        fi
        set +e
        PYTHH_ART_REFRESH_STALE=1 node scripts/generate-pythh-art.mjs
        gen=$?
        node scripts/sync-art-editions-local.mjs
        sync=$?
        node scripts/art-teaser-probe.mjs --base https://pythh.ai
        probe=$?
        if [ "$gen" -ne 0 ]; then
          echo "::warning::generate-pythh-art exited $gen"
        fi
        if [ "$gen" -ne 0 ] && [ "$sync" -ne 0 ]; then
          exit 1
        fi
        if [ "$probe" -ne 0 ]; then
          echo "::warning::art teaser probe failed after generation"
        fi
      timeout_minutes: 25
