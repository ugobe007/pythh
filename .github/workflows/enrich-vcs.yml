name: VC Data Enrichment

# Schedule enrichment to run automatically
on:
  schedule:
    # Runs daily at 3 AM UTC (adjust timezone as needed)
    - cron: '0 3 * * *'
    
    # Optional: Run twice daily (3 AM and 3 PM UTC)
    # - cron: '0 3,15 * * *'
    
    # Optional: Run every 6 hours
    # - cron: '0 */6 * * *'
  
  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:

jobs:
  enrich-vc-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Match fly-deploy / god-golden: many repos only define SUPABASE_* secret names
      - name: Verify Supabase env
        run: |
          URL="${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}"
          ANON="${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}"
          SVC="${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          if [ -z "$URL" ] || [ -z "$ANON" ] || [ -z "$SVC" ]; then
            echo "❌ Missing secrets. Set VITE_SUPABASE_URL or SUPABASE_URL, VITE_SUPABASE_ANON_KEY or SUPABASE_ANON_KEY, and SUPABASE_SERVICE_KEY (or SUPABASE_SERVICE_ROLE_KEY)."
            exit 1
          fi
          echo "✅ Supabase URL, anon key, and service key are set."

      - name: Run VC enrichment
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          mkdir -p logs
          echo "🚀 Starting VC enrichment..."
          npx tsx scripts/enrich-vcs.ts
          echo "✅ Enrichment complete!"

      - name: Upload logs (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: enrichment-logs-${{ github.run_number }}
          path: logs/
          if-no-files-found: ignore
          retention-days: 7
